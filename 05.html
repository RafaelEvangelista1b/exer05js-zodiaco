<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Batalha das 12 Casas</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 320px;
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    h1 {
      margin-bottom: 25px;
      font-size: 26px;
      color: #f87171;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: #e2e8f0;
      outline: none;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    }

    input::placeholder {
      color: #64748b;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 14px;
      color: #cbd5f5;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ef4444, #f87171);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(239, 68, 68, 0.9);
    }

    #resultado {
      margin-top: 20px;
      font-size: 16px;
      padding: 15px;
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.8);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚔️ Batalha das 12 Casas</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <input type="number" id="cosmo" placeholder="Cosmo inicial">

    <label>
      <input type="checkbox" id="sacrificio">
      Sacrificar sentidos (dobrar cosmo)
    </label>

    <button onclick="iniciarJornada()">Iniciar Jornada</button>

    <div id="resultado"></div>
  </div>

  <script>
    function iniciarJornada() {
      const nome = document.getElementById("nome").value;
      
      let cosmo = +document.getElementById("cosmo").value;

      const sacrificar = document.getElementById("sacrificio").checked;
      cosmo = sacrificar ? cosmo * 2 : cosmo;

      let casas = 12;
      let danoPorCasa = 100;

      for (let i = 1; i <= casas; i++) {
        cosmo = cosmo >= danoPorCasa ? cosmo - danoPorCasa : cosmo;
      }

      let status = cosmo >= 1000 ? "Vivo" : "Derrotado";

      let mensagem = (cosmo >= 1000 && status === "Vivo")
        ? `🏆 Parabéns, ${nome}! Você salvou Athena com ${cosmo} de cosmo restante!`
        : `💀 Que pena, ${nome}... você falhou. Cosmo final: ${cosmo}`;

      document.getElementById("resultado").innerText = mensagem;
    }
  </script>

</body>
</html>
